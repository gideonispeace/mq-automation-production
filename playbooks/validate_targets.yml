---
- name: Validate remote MQ targets
  hosts: mq_targets
  gather_facts: yes

  tasks:
    - name: Show hostname
      ansible.builtin.debug:
        msg: "Hostname is {{ ansible_hostname }}"

    - name: Show operating system
      ansible.builtin.debug:
        msg: "OS is {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: Show current remote user
      ansible.builtin.command: whoami
      register: whoami_result
      changed_when: false

    - name: Print current remote user
      ansible.builtin.debug:
        msg: "Connected as {{ whoami_result.stdout }}"

    - name: Check free space on root filesystem
      ansible.builtin.command: df -h /
      register: disk_result
      changed_when: false

    - name: Print root filesystem usage
      ansible.builtin.debug:
        var: disk_result.stdout_lines

    - name: Check whether podman is available
      ansible.builtin.command: which podman
      register: podman_result
      changed_when: false
      failed_when: false

    - name: Show podman location
      ansible.builtin.debug:
        msg: >-
          podman rc={{ podman_result.rc }}
          path={{ podman_result.stdout | default('not found') }}

    - name: Check whether MQ container is running
      ansible.builtin.command: podman ps --filter name=mq-dev --format "{{'{{'}}.Names{{'}}'}}"
      register: mq_container_result
      changed_when: false
      failed_when: false

    - name: Show MQ container status
      ansible.builtin.debug:
        msg: >-
          mq-dev container={{ mq_container_result.stdout | default('not running') }}

    - name: Check queue manager status inside container
      ansible.builtin.command: podman exec mq-dev dspmq
      register: dspmq_output
      changed_when: false
      failed_when: false
      when: mq_container_result.stdout == "mq-dev"

    - name: Print queue manager list
      ansible.builtin.debug:
        var: dspmq_output.stdout_lines
      when: mq_container_result.stdout == "mq-dev"

    - name: Check runmqsc inside container
      ansible.builtin.shell: |
        podman exec mq-dev bash -lc "echo 'DISPLAY QMGR' | runmqsc {{ mq_queue_manager }}"
      register: runmqsc_output
      changed_when: false
      failed_when: false
      when: mq_container_result.stdout == "mq-dev"

    - name: Print runmqsc output
      ansible.builtin.debug:
        var: runmqsc_output.stdout_lines
      when: mq_container_result.stdout == "mq-dev"
