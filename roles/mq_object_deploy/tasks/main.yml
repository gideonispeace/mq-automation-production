---
- name: Check whether runmqsc is available
  ansible.builtin.command: which runmqsc
  register: runmqsc_check
  changed_when: false
  failed_when: false

- name: Display MQ deployment mode
  ansible.builtin.debug:
    msg: >
      MQ deployment for {{ inventory_hostname }}
      Queue Manager: {{ mq_queue_manager }}
      runmqsc available: {{ runmqsc_check.rc == 0 }}

- name: Render MQSC template
  ansible.builtin.template:
    src: sample.mqsc.j2
    dest: /tmp/{{ mq_queue_manager }}.mqsc

- name: Show generated MQSC file
  ansible.builtin.command: cat /tmp/{{ mq_queue_manager }}.mqsc
  register: mqsc_output
  changed_when: false

- name: Print MQSC content
  ansible.builtin.debug:
    var: mqsc_output.stdout_lines

- name: Simulate MQ deployment if MQ not installed
  ansible.builtin.debug:
    msg: "Simulating MQ deployment on {{ inventory_hostname }}"
  when: runmqsc_check.rc != 0

- name: Execute MQSC commands
  ansible.builtin.shell: "runmqsc {{ mq_queue_manager }} < /tmp/{{ mq_queue_manager }}.mqsc"
  when: runmqsc_check.rc == 0
