---
- name: Check if MQ container exists
  become: true
  ansible.builtin.command: podman ps --filter "name=mq-dev" --format "{{'{{'}}.Names{{'}}'}}"
  register: podman_check
  changed_when: false

- name: Show container check result
  ansible.builtin.debug:
    msg: "Detected container name: {{ podman_check.stdout | default('none') }}"

- name: Fail if MQ container is not running
  ansible.builtin.fail:
    msg: "MQ container mq-dev is not running"
  when: podman_check.stdout != "mq-dev"

- name: Render MQSC template
  ansible.builtin.template:
    src: sample.mqsc.j2
    dest: /tmp/{{ mq_queue_manager }}.mqsc

- name: Show generated MQSC file
  ansible.builtin.command: cat /tmp/{{ mq_queue_manager }}.mqsc
  register: mqsc_output
  changed_when: false

- name: Print MQSC content
  ansible.builtin.debug:
    var: mqsc_output.stdout_lines

- name: Copy MQSC file into container
  become: true
  ansible.builtin.command: >
    podman cp /tmp/{{ mq_queue_manager }}.mqsc mq-dev:/tmp/{{ mq_queue_manager }}.mqsc

- name: Execute MQSC inside container
  become: true
  ansible.builtin.command: >
    podman exec mq-dev bash -lc "runmqsc {{ mq_queue_manager }} < /tmp/{{ mq_queue_manager }}.mqsc"
  register: mq_exec
  when: mq_deploy_enabled | bool

- name: Show MQ execution output
  ansible.builtin.debug:
    var: mq_exec.stdout_lines
  when: mq_deploy_enabled | bool
